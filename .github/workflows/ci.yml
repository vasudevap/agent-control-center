name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/constraints.txt

      - name: Install dependencies
        run: npm ci

      - name: Install backend dependencies
        run: python -m pip install -c apps/api/constraints.txt -e "apps/api[dev]"

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Backend typecheck
        run: python -m mypy apps/api/src

      - name: Backend lint
        run: python -m ruff check apps/api

      - name: Backend tests
        run: python -m pytest apps/api

      - name: Backend migrations
        working-directory: apps/api
        run: |
          python -m alembic upgrade head
          python -m alembic downgrade base

      - name: Build
        run: npm run build
